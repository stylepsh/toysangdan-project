<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 회원가입 | 토이상단</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-bg-effects"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div style="font-size:48px; margin-bottom:8px;">🧸</div>
          <h1>토이상단</h1>
          <p>인형뽑기 도매 전문 플랫폼</p>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">
          <button class="login-tab active" onclick="switchTab('login')">로그인</button>
          <button class="login-tab" onclick="switchTab('register')">사업자 회원가입</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">아이디</label>
            <input type="text" class="form-input" placeholder="아이디를 입력하세요" id="login-id" value="demo">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input type="password" class="form-input" placeholder="비밀번호를 입력하세요" id="login-pw" value="demo123">
          </div>
          <button type="submit" class="btn-submit">로그인</button>
          <div style="text-align:center; margin-top:16px;">
            <a href="#" style="color:var(--text-light); font-size:13px;" onclick="switchTab('register')">아직 회원이 아니신가요? <span style="color:var(--primary);">회원가입</span></a>
          </div>
          <div style="text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
            <a href="admin.html" style="color:var(--text-light); font-size:12px;">🔧 관리자 페이지</a>
          </div>
        </form>

        <!-- Register Form -->
        <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">상호명 (매장명) *</label>
            <input type="text" class="form-input" placeholder="예: 스타뽑기 강남점" required id="reg-store">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">대표자명 *</label>
              <input type="text" class="form-input" placeholder="홍길동" required id="reg-name">
            </div>
            <div class="form-group">
              <label class="form-label">연락처 *</label>
              <input type="tel" class="form-input" placeholder="010-0000-0000" required id="reg-phone">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">사업자등록번호 *</label>
            <input type="text" class="form-input" placeholder="000-00-00000" required id="reg-bizno">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">업태</label>
              <input type="text" class="form-input" placeholder="예: 도소매" id="reg-biztype">
            </div>
            <div class="form-group">
              <label class="form-label">종목</label>
              <input type="text" class="form-input" placeholder="예: 인형, 완구" id="reg-bizitem">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" class="form-input" placeholder="example@email.com" id="reg-email">
          </div>
          <div class="form-group">
            <label class="form-label">아이디 *</label>
            <input type="text" class="form-input" placeholder="영문, 숫자 조합 4~20자" required id="reg-id">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">비밀번호 *</label>
              <input type="password" class="form-input" placeholder="8자 이상" required id="reg-pw">
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 확인 *</label>
              <input type="password" class="form-input" placeholder="비밀번호 재입력" required id="reg-pw2">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">가입 경로</label>
            <select class="form-select route-select" id="reg-route">
              <option value="">어떻게 알게 되셨나요?</option>
              <option value="네이버 검색">네이버 검색</option>
              <option value="카카오톡 광고">카카오톡 광고</option>
              <option value="카카오톡 오픈채팅">카카오톡 오픈채팅</option>
              <option value="도매꾹">도매꾹</option>
              <option value="유튜브">유튜브</option>
              <option value="인스타그램">인스타그램</option>
              <option value="네이버 블로그">네이버 블로그</option>
              <option value="지인 소개">지인 소개</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">사업자등록증 사본 업로드 *</label>
            <div class="file-upload-area" id="file-upload-area" onclick="document.getElementById('biz-cert-file').click()">
              <div class="icon">📄</div>
              <p>클릭하여 사업자등록증을 업로드하세요</p>
              <p class="small">JPG, PNG, PDF (최대 10MB)</p>
            </div>
            <input type="file" id="biz-cert-file" accept="image/*,.pdf" style="display:none;" onchange="handleFileUpload(this)">
            <div id="file-preview" style="display:none; margin-top:12px; padding:12px; background:rgba(0,206,201,0.1); border-radius:8px; border:1px solid rgba(0,206,201,0.3);">
              <div style="display:flex; align-items:center; gap:8px; color:var(--accent);">
                <span>✅</span>
                <span id="file-name" style="font-size:14px;"></span>
                <button type="button" onclick="removeFile()" style="margin-left:auto; color:var(--danger); font-size:12px; background:none; border:none; cursor:pointer;">삭제</button>
              </div>
            </div>
          </div>
          <div style="background:rgba(255,217,61,0.1); border:1px solid rgba(255,217,61,0.3); border-radius:12px; padding:16px; margin-bottom:20px;">
            <p style="color:#E65100; font-size:14px; line-height:1.7;">
              ⚠️ <strong>사업자 인증 안내</strong><br>
              회원가입 후 사업자등록증 확인이 완료되면 SMS/카톡으로 승인 알림을 보내드립니다. (영업일 기준 1일 이내)
            </p>
          </div>
          <button type="submit" class="btn-submit">회원가입 신청</button>
          <div style="text-align:center; margin-top:16px;">
            <a href="#" style="color:var(--text-light); font-size:13px;" onclick="switchTab('login')">이미 회원이신가요? <span style="color:var(--primary);">로그인</span></a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.login-tab');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');

      tabs.forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        tabs[0].classList.add('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      } else {
        tabs[1].classList.add('active');
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('login-id').value;
      const pw = document.getElementById('login-pw').value;
      if (id && pw) {
        localStorage.setItem('toysangdan_logged_in', 'true');
        localStorage.setItem('toysangdan_user', JSON.stringify({
          id: id, name: '데모 사용자', store: '데모 매장', grade: 'silver'
        }));
        alert('로그인 성공! 홈으로 이동합니다.');
        window.location.href = 'index.html';
      }
    }

    function handleRegister(e) {
      e.preventDefault();
      const pw = document.getElementById('reg-pw').value;
      const pw2 = document.getElementById('reg-pw2').value;
      if (pw !== pw2) {
        alert('비밀번호가 일치하지 않습니다.');
        return;
      }
      const hasCert = document.getElementById('file-preview').style.display !== 'none';
      if (!hasCert) {
        alert('사업자등록증을 업로드해 주세요.');
        return;
      }
      alert('✅ 회원가입 신청이 완료되었습니다!\n\n사업자 인증 확인 후 승인 알림을 보내드리겠습니다.\n(영업일 기준 1일 이내)');
      window.location.href = 'index.html';
    }

    function handleFileUpload(input) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        document.getElementById('file-name').textContent = file.name;
        document.getElementById('file-preview').style.display = 'block';
        document.getElementById('file-upload-area').style.display = 'none';
      }
    }

    function removeFile() {
      document.getElementById('biz-cert-file').value = '';
      document.getElementById('file-preview').style.display = 'none';
      document.getElementById('file-upload-area').style.display = 'block';
    }
  </script>
</body>
</html>
