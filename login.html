<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 회원가입 | 토이상단</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .step-indicator { display:flex; gap:0; margin-bottom:28px; position:relative; }
    .step-dot { flex:1; text-align:center; position:relative; z-index:1; }
    .step-dot .dot {
      width:32px; height:32px; border-radius:50%; margin:0 auto 6px;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; border:2px solid var(--border);
      background:#fff; color:var(--text-light); transition:all 0.3s;
    }
    .step-dot.active .dot { background:var(--primary); color:#fff; border-color:var(--primary); }
    .step-dot.done .dot { background:var(--success); color:#fff; border-color:var(--success); }
    .step-dot .step-label { font-size:11px; color:var(--text-light); }
    .step-dot.active .step-label { color:var(--primary); font-weight:600; }
    .step-line {
      position:absolute; top:16px; left:16%; right:16%; height:2px;
      background:var(--border); z-index:0;
    }
    .step-content { display:none; }
    .step-content.active { display:block; }
    .step-nav { display:flex; gap:12px; margin-top:20px; }
    .step-nav button { flex:1; }
    .pw-strength { height:4px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden; }
    .pw-strength-bar { height:100%; border-radius:2px; transition:width 0.3s, background 0.3s; width:0; }
    .pw-strength-label { font-size:11px; margin-top:4px; color:var(--text-light); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-bg-effects"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div style="font-size:48px; margin-bottom:8px;">🧸</div>
          <h1>토이상단</h1>
          <p>인형뽑기 도매 전문 플랫폼</p>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">
          <button class="login-tab active" onclick="switchTab('login')">로그인</button>
          <button class="login-tab" onclick="switchTab('register')">사업자 회원가입</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-id">아이디</label>
            <input type="text" class="form-input" placeholder="아이디를 입력하세요" id="login-id" value="demo" autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="login-pw">비밀번호</label>
            <input type="password" class="form-input" placeholder="비밀번호를 입력하세요" id="login-pw" value="demo123" autocomplete="current-password">
          </div>
          <button type="submit" class="btn-submit">로그인</button>
          <div style="text-align:center; margin-top:16px;">
            <a href="#" style="color:var(--text-light); font-size:13px;" onclick="switchTab('register')">아직 회원이 아니신가요? <span style="color:var(--primary);">회원가입</span></a>
          </div>
          <div style="text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--border);">
            <a href="admin.html" style="color:var(--text-light); font-size:12px;">🔧 관리자 페이지</a>
          </div>
        </form>

        <!-- Register Form (Step) -->
        <div id="register-form" style="display:none;">
          <!-- Step Indicator -->
          <div class="step-indicator">
            <div class="step-line"></div>
            <div class="step-dot active" id="step-dot-1">
              <div class="dot">1</div>
              <div class="step-label">기본정보</div>
            </div>
            <div class="step-dot" id="step-dot-2">
              <div class="dot">2</div>
              <div class="step-label">사업자정보</div>
            </div>
            <div class="step-dot" id="step-dot-3">
              <div class="dot">3</div>
              <div class="step-label">계정설정</div>
            </div>
          </div>

          <!-- Step 1: 기본정보 -->
          <div class="step-content active" id="step-1">
            <div class="form-group">
              <label class="form-label">상호명 (매장명) *</label>
              <input type="text" class="form-input" placeholder="예: 스타뽑기 강남점" id="reg-store" maxlength="50">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">대표자명 *</label>
                <input type="text" class="form-input" placeholder="홍길동" id="reg-name" maxlength="20">
              </div>
              <div class="form-group">
                <label class="form-label">연락처 *</label>
                <input type="tel" class="form-input" placeholder="010-0000-0000" id="reg-phone" maxlength="13" oninput="formatPhone(this)">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">이메일</label>
              <input type="email" class="form-input" placeholder="example@email.com" id="reg-email">
            </div>
            <div class="form-group">
              <label class="form-label">가입 경로</label>
              <select class="form-select route-select" id="reg-route">
                <option value="">어떻게 알게 되셨나요?</option>
                <option value="네이버 검색">네이버 검색</option>
                <option value="카카오톡 광고">카카오톡 광고</option>
                <option value="카카오톡 오픈채팅">카카오톡 오픈채팅</option>
                <option value="도매꾹">도매꾹</option>
                <option value="유튜브">유튜브</option>
                <option value="인스타그램">인스타그램</option>
                <option value="네이버 블로그">네이버 블로그</option>
                <option value="지인 소개">지인 소개</option>
                <option value="기타">기타</option>
              </select>
            </div>
            <div class="step-nav">
              <button type="button" class="btn-submit" onclick="goStep(2)">다음 단계 →</button>
            </div>
          </div>

          <!-- Step 2: 사업자정보 -->
          <div class="step-content" id="step-2">
            <div class="form-group">
              <label class="form-label">사업자등록번호 *</label>
              <input type="text" class="form-input" placeholder="000-00-00000" id="reg-bizno" maxlength="12" oninput="formatBizNo(this)">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">업태</label>
                <input type="text" class="form-input" placeholder="예: 도소매" id="reg-biztype">
              </div>
              <div class="form-group">
                <label class="form-label">종목</label>
                <input type="text" class="form-input" placeholder="예: 인형, 완구" id="reg-bizitem">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">사업자등록증 사본 업로드 *</label>
              <div class="file-upload-area" id="file-upload-area" onclick="document.getElementById('biz-cert-file').click()">
                <div class="icon">📄</div>
                <p>클릭하여 사업자등록증을 업로드하세요</p>
                <p class="small">JPG, PNG, PDF (최대 10MB)</p>
              </div>
              <input type="file" id="biz-cert-file" accept="image/*,.pdf" style="display:none;" onchange="handleFileUpload(this)">
              <div id="file-preview" style="display:none; margin-top:12px; padding:12px; background:rgba(0,206,201,0.1); border-radius:8px; border:1px solid rgba(0,206,201,0.3);">
                <div style="display:flex; align-items:center; gap:8px; color:var(--accent);">
                  <span>✅</span>
                  <span id="file-name" style="font-size:14px;"></span>
                  <button type="button" onclick="removeFile()" style="margin-left:auto; color:var(--danger); font-size:12px; background:none; border:none; cursor:pointer;">삭제</button>
                </div>
              </div>
            </div>
            <div class="step-nav">
              <button type="button" class="btn-submit" style="background:var(--border);color:var(--text-secondary);" onclick="goStep(1)">← 이전</button>
              <button type="button" class="btn-submit" onclick="goStep(3)">다음 단계 →</button>
            </div>
          </div>

          <!-- Step 3: 계정설정 -->
          <div class="step-content" id="step-3">
            <div class="form-group">
              <label class="form-label">아이디 *</label>
              <input type="text" class="form-input" placeholder="영문, 숫자 조합 4~20자" id="reg-id" maxlength="20" autocomplete="username">
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 *</label>
              <input type="password" class="form-input" placeholder="8자 이상, 영문+숫자 조합" id="reg-pw" oninput="checkPwStrength()" autocomplete="new-password">
              <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
              <div class="pw-strength-label" id="pw-label"></div>
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 확인 *</label>
              <input type="password" class="form-input" placeholder="비밀번호 재입력" id="reg-pw2" autocomplete="new-password">
            </div>
            <div style="background:rgba(255,217,61,0.1); border:1px solid rgba(255,217,61,0.3); border-radius:12px; padding:16px; margin-bottom:20px;">
              <p style="color:#E65100; font-size:14px; line-height:1.7;">
                ⚠️ <strong>사업자 인증 안내</strong><br>
                회원가입 후 사업자등록증 확인이 완료되면 SMS/카톡으로 승인 알림을 보내드립니다. (영업일 기준 1일 이내)
              </p>
            </div>
            <div class="step-nav">
              <button type="button" class="btn-submit" style="background:var(--border);color:var(--text-secondary);" onclick="goStep(2)">← 이전</button>
              <button type="button" class="btn-submit" onclick="handleRegister()">회원가입 신청</button>
            </div>
          </div>

          <div style="text-align:center; margin-top:16px;">
            <a href="#" style="color:var(--text-light); font-size:13px;" onclick="switchTab('login')">이미 회원이신가요? <span style="color:var(--primary);">로그인</span></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 1;

    function switchTab(tab) {
      const tabs = document.querySelectorAll('.login-tab');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      tabs.forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        tabs[0].classList.add('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      } else {
        tabs[1].classList.add('active');
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
      }
    }

    function goStep(step) {
      // Validation
      if (step > currentStep) {
        if (currentStep === 1) {
          if (!document.getElementById('reg-store').value.trim()) { alert('상호명을 입력해주세요.'); return; }
          if (!document.getElementById('reg-name').value.trim()) { alert('대표자명을 입력해주세요.'); return; }
          if (!document.getElementById('reg-phone').value.trim()) { alert('연락처를 입력해주세요.'); return; }
        }
        if (currentStep === 2) {
          if (!document.getElementById('reg-bizno').value.trim()) { alert('사업자등록번호를 입력해주세요.'); return; }
          if (document.getElementById('file-preview').style.display === 'none') { alert('사업자등록증을 업로드해주세요.'); return; }
        }
      }

      currentStep = step;
      document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');

      for (let i = 1; i <= 3; i++) {
        const dot = document.getElementById('step-dot-' + i);
        dot.classList.remove('active', 'done');
        if (i < step) dot.classList.add('done');
        if (i === step) dot.classList.add('active');
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('login-id').value;
      const pw = document.getElementById('login-pw').value;
      if (id && pw) {
        localStorage.setItem('toysangdan_logged_in', 'true');
        localStorage.setItem('toysangdan_user', JSON.stringify({
          id: id, name: '데모 사용자', store: '데모 매장', grade: 'silver'
        }));
        alert('로그인 성공! 홈으로 이동합니다.');
        window.location.href = 'index.html';
      }
    }

    function handleRegister() {
      const pw = document.getElementById('reg-pw').value;
      const pw2 = document.getElementById('reg-pw2').value;
      const id = document.getElementById('reg-id').value.trim();

      if (!id || id.length < 4) { alert('아이디는 4자 이상 입력해주세요.'); return; }
      if (!pw || pw.length < 8) { alert('비밀번호는 8자 이상 입력해주세요.'); return; }
      if (pw !== pw2) { alert('비밀번호가 일치하지 않습니다.'); return; }

      alert('✅ 회원가입 신청이 완료되었습니다!\n\n사업자 인증 확인 후 승인 알림을 보내드리겠습니다.\n(영업일 기준 1일 이내)');
      window.location.href = 'index.html';
    }

    // 사업자번호 자동 포맷팅
    function formatBizNo(input) {
      let v = input.value.replace(/[^0-9]/g, '');
      if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3);
      if (v.length > 6) v = v.slice(0,6) + '-' + v.slice(6);
      if (v.length > 12) v = v.slice(0,12);
      input.value = v;
    }

    // 전화번호 자동 포맷팅
    function formatPhone(input) {
      let v = input.value.replace(/[^0-9]/g, '');
      if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3);
      if (v.length > 8) v = v.slice(0,8) + '-' + v.slice(8);
      if (v.length > 13) v = v.slice(0,13);
      input.value = v;
    }

    // 비밀번호 강도 표시
    function checkPwStrength() {
      const pw = document.getElementById('reg-pw').value;
      const bar = document.getElementById('pw-bar');
      const label = document.getElementById('pw-label');
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^a-zA-Z0-9]/.test(pw)) score++;

      const levels = [
        { width: '0%', color: '#E9ECEF', text: '' },
        { width: '20%', color: '#E17055', text: '매우 약함' },
        { width: '40%', color: '#FDCB6E', text: '약함' },
        { width: '60%', color: '#FFD93D', text: '보통' },
        { width: '80%', color: '#00B894', text: '강함' },
        { width: '100%', color: '#00B894', text: '매우 강함' }
      ];
      const level = levels[Math.min(score, 5)];
      bar.style.width = level.width;
      bar.style.background = level.color;
      label.textContent = level.text;
      label.style.color = level.color;
    }

    function handleFileUpload(input) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        if (file.size > 10 * 1024 * 1024) {
          alert('파일 크기는 10MB 이하로 업로드해주세요.');
          input.value = '';
          return;
        }
        document.getElementById('file-name').textContent = file.name;
        document.getElementById('file-preview').style.display = 'block';
        document.getElementById('file-upload-area').style.display = 'none';
      }
    }

    function removeFile() {
      document.getElementById('biz-cert-file').value = '';
      document.getElementById('file-preview').style.display = 'none';
      document.getElementById('file-upload-area').style.display = 'block';
    }
  </script>
</body>
</html>
